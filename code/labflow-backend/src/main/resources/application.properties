spring.application.name=labflow

# database connection
# the datasource url points to our database
spring.datasource.url=jdbc:sqlite:databases/labflow.db
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# keep existing tables; apply minimal schema changes (better for persistence)
# change to create-drop for development (to drop db for each run)
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.show-sql=true
